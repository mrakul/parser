# Сильно не разбирался: пускаем тесты из main, тесты описаны внизу
name: Rust CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'practice/**'           # Only run when practice code changes
      - '.github/workflows/**'  # Run when workflow itself changes
  pull_request:
    branches: [ "main" ]
    paths:
      - 'practice/**'

jobs:
  # Parser tests
  test-parser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: practice/module_1/parser
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build library
        run: cargo build --lib --verbose

      - name: Build binaries
        run: cargo build --bins --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy
      #   run: cargo clippy -- -D warnings
        run: cargo clippy

      # - name: Check formatting
        # run: cargo fmt --all -- --check